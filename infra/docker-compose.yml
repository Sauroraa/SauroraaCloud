services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge
      - internal

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    networks:
      - edge

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env.example
    depends_on:
      - mariadb
      - redis
    networks:
      - internal

  mariadb:
    image: mariadb:11.7
    environment:
      MARIADB_DATABASE: sauroraacloud
      MARIADB_USER: sauroraa
      MARIADB_PASSWORD: change-me
      MARIADB_ROOT_PASSWORD: root-change-me
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - internal

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    networks:
      - internal

networks:
  edge:
  internal:
    internal: true

volumes:
  mariadb_data:
  redis_data:

